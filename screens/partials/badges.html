<!-- Badges content -->
<style>
  :root {
    --rare: #7c86f0; --rare-dim: rgba(124,134,240,0.12);
    --epic: #a87ee0; --epic-dim: rgba(168,126,224,0.12);
    --legendary: #e8a83a; --legendary-dim: rgba(232,168,58,0.12);
  }
  .badges-wrap { max-width:900px; }
  .hero { background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:28px 32px; display:flex; align-items:center; gap:32px; margin-bottom:28px; }
  .hero-level { width:72px; height:72px; border-radius:50%; flex-shrink:0; border:2px solid var(--accent-border); background:var(--accent-dim); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .hero-level-num { font-size:22px; font-weight:700; color:var(--accent); line-height:1; }
  .hero-level-lbl { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-top:2px; }
  .hero-info { flex:1; }
  .hero-title { font-size:1.1rem; font-weight:600; letter-spacing:-0.3px; margin-bottom:4px; }
  .hero-sub { font-size:13px; color:var(--muted); margin-bottom:14px; }
  .xp-bar-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .xp-bar-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
  .xp-bar-val { font-size:12px; font-weight:500; color:var(--accent); }
  .xp-bar { height:6px; border-radius:100px; background:rgba(255,255,255,0.07); overflow:hidden; }
  .xp-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#fff)); transition:width 0.6s cubic-bezier(.34,1.56,.64,1); }
  .hero-stats { display:flex; flex-direction:column; gap:8px; align-items:flex-end; flex-shrink:0; }
  .hero-stat { text-align:right; }
  .hero-stat-val { font-size:20px; font-weight:700; color:var(--text); line-height:1; }
  .hero-stat-lbl { font-size:10px; color:var(--muted); margin-top:2px; }
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }
  .stat-tile { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
  .stat-tile-val { font-size:22px; font-weight:700; color:var(--text); }
  .stat-tile-lbl { font-size:11px; color:var(--muted); margin-top:3px; }
  .filter-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; }
  .filter-tab { padding:6px 14px; border-radius:100px; border:1px solid var(--border); background:transparent; font-family:'Inter',sans-serif; font-size:12.5px; font-weight:500; color:var(--muted); cursor:pointer; transition:all 0.15s; }
  .filter-tab:hover { border-color:rgba(255,255,255,0.14); color:var(--text); }
  .filter-tab.active { background:var(--accent-dim); border-color:var(--accent-border); color:var(--accent); }
  .badge-group { margin-bottom:32px; }
  .badge-group-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .badge-group-title { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); opacity:0.7; }
  .badge-group-prog { font-size:11.5px; color:var(--muted); }
  .badge-group-prog span { color:var(--accent); font-weight:600; }
  .badge-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .badge-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:20px 14px 16px; display:flex; flex-direction:column; align-items:center; gap:10px; position:relative; transition:all 0.2s; }
  .badge-card.earned { border-color:var(--accent-border); background:var(--accent-dim); }
  .badge-card.locked { opacity:0.42; }
  .badge-card.rare.earned { border-color:rgba(124,134,240,0.35); background:rgba(124,134,240,0.08); }
  .badge-card.epic.earned { border-color:rgba(168,126,224,0.35); background:rgba(168,126,224,0.08); }
  .badge-card.legendary.earned { border-color:rgba(232,168,58,0.4); background:rgba(232,168,58,0.07); box-shadow:0 0 20px rgba(232,168,58,0.06); }
  .rarity-pill { position:absolute; top:10px; right:10px; font-size:8.5px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; padding:3px 7px; border-radius:100px; }
  .rarity-common { background:rgba(255,255,255,0.06); color:var(--muted); }
  .rarity-rare { background:rgba(124,134,240,0.14); color:var(--rare); }
  .rarity-epic { background:rgba(168,126,224,0.14); color:var(--epic); }
  .rarity-legendary { background:rgba(232,168,58,0.16); color:var(--legendary); }
  .badge-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); font-size:22px; line-height:1; flex-shrink:0; }
  .badge-card.earned .badge-icon { background:var(--accent-dim); border-color:var(--accent-border); }
  .badge-card.rare.earned .badge-icon { background:rgba(124,134,240,0.12); border-color:rgba(124,134,240,0.3); }
  .badge-card.epic.earned .badge-icon { background:rgba(168,126,224,0.12); border-color:rgba(168,126,224,0.3); }
  .badge-card.legendary.earned .badge-icon { background:rgba(232,168,58,0.14); border-color:rgba(232,168,58,0.35); }
  .badge-title { font-size:12.5px; font-weight:600; text-align:center; line-height:1.3; }
  .badge-desc { font-size:11px; color:var(--muted); text-align:center; line-height:1.5; }
  .badge-card.earned .badge-title { color:var(--accent); }
  .badge-card.rare.earned .badge-title { color:var(--rare); }
  .badge-card.epic.earned .badge-title { color:var(--epic); }
  .badge-card.legendary.earned .badge-title { color:var(--legendary); }
  .badge-prog { width:100%; }
  .badge-prog-bar { height:3px; border-radius:100px; background:rgba(255,255,255,0.07); overflow:hidden; }
  .badge-prog-fill { height:100%; border-radius:100px; background:var(--accent); }
  .badge-prog-lbl { font-size:10px; color:var(--muted); text-align:center; margin-top:4px; }
  .badge-earned-mark { position:absolute; top:10px; left:10px; width:18px; height:18px; border-radius:50%; background:var(--accent); display:none; align-items:center; justify-content:center; }
  .badge-card.earned .badge-earned-mark { display:flex; }
  .badge-card.rare.earned .badge-earned-mark { background:var(--rare); }
  .badge-card.epic.earned .badge-earned-mark { background:var(--epic); }
  .badge-card.legendary.earned .badge-earned-mark { background:var(--legendary); }
  .badge-earned-mark svg { stroke:var(--bg); }
  @media (max-width: 768px) { .hero { padding:20px; gap:16px; flex-wrap:wrap; } .hero-stats { flex-direction:row; } .stats-row { grid-template-columns:repeat(2,1fr); } .badge-grid { grid-template-columns:repeat(2,1fr); gap:10px; } }
  @media (max-width: 480px) { .badge-grid { gap:8px; } .badge-card { padding:16px 10px 12px; } .badge-icon { width:44px; height:44px; font-size:20px; } }
</style>

<div class="badges-wrap">

  <div class="hero" id="hero">
    <div class="hero-level">
      <div class="hero-level-num" id="hero-level">1</div>
      <div class="hero-level-lbl">Livello</div>
    </div>
    <div class="hero-info">
      <div class="hero-title" id="hero-rank">Principiante</div>
      <div class="hero-sub" id="hero-sub">Inizia a guadagnare badge per salire di livello</div>
      <div>
        <div class="xp-bar-top">
          <span class="xp-bar-label">XP</span>
          <span class="xp-bar-val" id="xp-val">0 / 50 XP</span>
        </div>
        <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="hero-stats">
      <div class="hero-stat"><div class="hero-stat-val" id="stat-earned">0</div><div class="hero-stat-lbl">Guadagnati</div></div>
      <div class="hero-stat"><div class="hero-stat-val" id="stat-total">0</div><div class="hero-stat-lbl">Totali</div></div>
    </div>
  </div>

  <div class="stats-row" id="stats-row"></div>
  <div class="filter-tabs" id="filter-tabs"></div>
  <div id="badge-container"></div>

</div>


<script>
  // Usa: BADGES, XP_TABLE, LEVEL_RANKS, CAT_LABELS, CAT_ORDER da core/constants.js
  // Usa: getEarned, saveEarned, awardBadge, updateStreak, getStreak, loadPrefs, getVisits da core/store.js
  // Usa: showToast da core/utils.js

  function autoCheck() {
    const prefs = loadPrefs();
    awardBadge('first_login');
    awardBadge('early_bird');
    if (prefs.name && prefs.avatarUrl) awardBadge('profile_done');
    if (prefs.themeChanged) awardBadge('theme_set');
    const visits = getVisits();
    const sections = ['dashboard','finance','psychology','health','consciousness'];
    if (sections.every(s => visits[s])) awardBadge('explorer');
    const streak = getStreak();
    if (streak >= 3)  awardBadge('streak_3');
    if (streak >= 7)  awardBadge('streak_7');
    if (streak >= 14) awardBadge('streak_14');
    if (streak >= 30) awardBadge('streak_30');
  }

  function getProgress(id) {
    const streak = getStreak();
    const map = { streak_3:streak, streak_7:streak, streak_14:streak, streak_30:streak };
    return map[id] ?? 0;
  }

  function calcXP(earnedSet) {
    let xp = 0;
    for (const id of earnedSet) { const b = BADGES.find(x => x.id === id); if (b) xp += XP_TABLE[b.rarity]; }
    return xp;
  }

  function getLevel(xp) {
    let rank = LEVEL_RANKS[0];
    for (const r of LEVEL_RANKS) { if (xp >= r.min) rank = r; }
    const idx = LEVEL_RANKS.indexOf(rank);
    const nextMin = LEVEL_RANKS[idx + 1]?.min ?? rank.min + 500;
    const pct = Math.min(100, ((xp - rank.min) / (nextMin - rank.min)) * 100);
    return { level: idx + 1, label: rank.label, sub: rank.sub, xp, nextMin, pct };
  }

  // alias per compatibilità con il toast del badge
  function showBadgeToast(msg) { showToast(msg); }

  let activeFilter = 'all';

  function render() {
    const earned = getEarned();
    const xp = calcXP(earned);
    const lvl = getLevel(xp);

    document.getElementById('hero-level').textContent = lvl.level;
    document.getElementById('hero-rank').textContent = lvl.label;
    document.getElementById('hero-sub').textContent = lvl.sub;
    document.getElementById('xp-val').textContent = xp + ' / ' + lvl.nextMin + ' XP';
    document.getElementById('xp-fill').style.width = lvl.pct + '%';
    document.getElementById('stat-earned').textContent = earned.size;
    document.getElementById('stat-total').textContent = BADGES.length;

    const streak = parseInt(localStorage.getItem('alter_streak') || '0', 10);
    const pct = Math.round((earned.size / BADGES.length) * 100);
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-tile"><div class="stat-tile-val">${earned.size}</div><div class="stat-tile-lbl">Badge guadagnati</div></div>
      <div class="stat-tile"><div class="stat-tile-val">${BADGES.length - earned.size}</div><div class="stat-tile-lbl">Da sbloccare</div></div>
      <div class="stat-tile"><div class="stat-tile-val">${pct}%</div><div class="stat-tile-lbl">Completamento</div></div>
      <div class="stat-tile"><div class="stat-tile-val">${streak}</div><div class="stat-tile-lbl">Giorni streak</div></div>`;

    const tabs = document.getElementById('filter-tabs');
    tabs.innerHTML = '';
    ['all', ...CAT_ORDER].forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-tab' + (activeFilter === cat ? ' active' : '');
      btn.textContent = cat === 'all' ? 'Tutti' : CAT_LABELS[cat];
      btn.onclick = () => { activeFilter = cat; render(); };
      tabs.appendChild(btn);
    });

    const container = document.getElementById('badge-container');
    container.innerHTML = '';
    const catsToShow = activeFilter === 'all' ? CAT_ORDER : [activeFilter];
    catsToShow.forEach(cat => {
      const catBadges = BADGES.filter(b => b.cat === cat);
      if (!catBadges.length) return;
      const catEarned = catBadges.filter(b => earned.has(b.id)).length;
      const group = document.createElement('div');
      group.className = 'badge-group';
      group.innerHTML = `<div class="badge-group-header"><div class="badge-group-title">${CAT_LABELS[cat]}</div><div class="badge-group-prog"><span>${catEarned}</span> / ${catBadges.length}</div></div><div class="badge-grid" id="grid-${cat}"></div>`;
      container.appendChild(group);
      const grid = document.getElementById('grid-' + cat);
      catBadges.forEach(b => {
        const isEarned = earned.has(b.id);
        const progMax = b.prog ?? 0;
        const progNow = progMax ? Math.min(progMax, getProgress(b.id)) : 0;
        const progPct = progMax ? Math.round((progNow / progMax) * 100) : 0;
        const card = document.createElement('div');
        card.className = `badge-card ${b.rarity}` + (isEarned ? ' earned' : ' locked');
        card.innerHTML = `
          <div class="badge-earned-mark"><svg width="8" height="6" viewBox="0 0 9 7" fill="none" stroke-width="2.5" stroke-linecap="round"><path d="M1 3.5L3.5 6L8 1"/></svg></div>
          <div class="rarity-pill rarity-${b.rarity}">${b.rarity}</div>
          <div class="badge-icon">${b.icon}</div>
          <div class="badge-title">${b.title}</div>
          <div class="badge-desc">${b.desc}</div>
          ${progMax && !isEarned ? `<div class="badge-prog"><div class="badge-prog-bar"><div class="badge-prog-fill" style="width:${progPct}%"></div></div><div class="badge-prog-lbl">${progNow} / ${progMax}</div></div>` : ''}`;
        grid.appendChild(card);
      });
    });
  }

  autoCheck();
  render();
  markVisit('badges');
</script>
