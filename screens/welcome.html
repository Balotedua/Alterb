<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alter — Il tuo assistente di vita</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #07070f;
      --accent: #7c3aed;
      --cyan: #06b6d4;
      --text: #f1f5f9;
      --muted: #475569;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background animated orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: drift 8s ease-in-out infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7c3aed, transparent);
      top: -150px; left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #06b6d4, transparent);
      bottom: -100px; right: -80px;
      animation-delay: 3s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #10b981, transparent);
      bottom: 20%; left: 10%;
      animation-delay: 5s;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.05); }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeUp 1s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      position: relative;
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.5), 0 0 80px rgba(6, 182, 212, 0.2);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(124,58,237,0.5), 0 0 80px rgba(6,182,212,0.2); }
      50%       { box-shadow: 0 0 60px rgba(124,58,237,0.7), 0 0 120px rgba(6,182,212,0.3); }
    }
    .avatar::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #06b6d4, #10b981);
      z-index: -1;
      animation: spin 4s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cyan);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      background: linear-gradient(135deg, #f1f5f9 30%, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 440px;
      line-height: 1.6;
    }

    /* Typewriter cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--cyan);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border: none;
      border-radius: 100px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(124, 58, 237, 0.6);
    }
    .btn svg {
      transition: transform 0.2s ease;
    }
    .btn:hover svg {
      transform: translateX(4px);
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      background: rgba(255,255,255,0.03);
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="content">
    <div class="avatar">🤖</div>

    <div>
      <div class="label">Assistente personale AI</div>
    </div>

    <h1>Benvenuto in Alter</h1>

    <p class="subtitle">
      <span id="typewriter"></span><span class="cursor"></span>
    </p>

    <div class="badge-row">
      <span class="badge">💰 Finanza</span>
      <span class="badge">🧠 Psicologia</span>
      <span class="badge">💪 Salute</span>
      <span class="badge">⏰ Routine</span>
      <span class="badge">🏆 Badge</span>
    </div>

    <a href="/dashboard" class="btn">
      Inizia il tuo viaggio
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>

  <script>
    const text = "Il tuo assistente di vita personale. Gestisci finanze, salute, psicologia, carriera e molto altro — tutto in un unico posto.";
    let i = 0;
    const el = document.getElementById('typewriter');
    function type() {
      if (i < text.length) {
        el.textContent += text[i++];
        setTimeout(type, 28);
      }
    }
    setTimeout(type, 800);
  </script>
</body>
</html>
