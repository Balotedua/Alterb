<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alter — Assistente personale</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #0c0b09;
      --text: #ece8de;
      --muted: #7a7068;
      --accent: #cf6a47;
      --accent-dim: rgba(207,106,71,0.1);
      --accent-border: rgba(207,106,71,0.28);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle warm orb */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #cf6a47, transparent 70%);
      top: -200px; left: -150px;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #5aaa8a, transparent 70%);
      bottom: -120px; right: -100px;
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.008) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.008) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: fadeUp 0.9s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar {
      width: 80px; height: 80px;
      border-radius: 20px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -1px;
      color: var(--text);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.65;
      font-weight: 400;
    }

    .cursor {
      display: inline-block;
      width: 1.5px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 28px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #0c0b09;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      letter-spacing: 0.1px;
    }
    .btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }
    .btn svg { transition: transform 0.2s ease; }
    .btn:hover svg { transform: translateX(3px); }

    .badge-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--muted);
      background: rgba(255,255,255,0.025);
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="content">
    <div class="avatar">🤖</div>

    <div class="label">Assistente personale AI</div>

    <h1>Benvenuto in Alter</h1>

    <p class="subtitle">
      <span id="typewriter"></span><span class="cursor"></span>
    </p>

    <div class="badge-row">
      <span class="badge">💰 Finanza</span>
      <span class="badge">🧠 Psicologia</span>
      <span class="badge">💪 Salute</span>
      <span class="badge">⏰ Routine</span>
      <span class="badge">🏆 Badge</span>
    </div>

    <a href="/auth" class="btn">
      Inizia
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>

  <script>
    const text = "Il tuo assistente di vita personale. Gestisci finanze, salute, psicologia, carriera e molto altro — tutto in un unico posto.";
    let i = 0;
    const el = document.getElementById('typewriter');
    function type() {
      if (i < text.length) {
        el.textContent += text[i++];
        setTimeout(type, 28);
      }
    }
    setTimeout(type, 800);
  </script>
</body>
</html>
